<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found &mdash; Loomstate</title>
<style>
  :root { --ink: #111; --paper: #fafaf8; --rule: #d8d6cf; --muted: #5a5a55; --accent: #8b5a3c; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, "Cascadia Mono", Consolas, monospace; font-size: 16px; line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  main { max-width: 520px; padding: 32px; text-align: center; }
  .brand { font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  h1 { font-size: 24px; margin: 8px 0 16px; font-weight: 600; }
  p { color: var(--muted); margin: 12px 0; }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
<main>
  <div class="brand">Loomstate</div>
  <h1>Page not found</h1>
  <p>The page you were looking for isn't here.</p>
  <p><a href="/">Go to the home page</a></p>
</main>
</body>
</html>
